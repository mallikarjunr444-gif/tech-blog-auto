name: Auto Blog

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  post-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install cerebras-cloud-sdk requests

      - name: Restore post log
        uses: actions/cache@v4
        with:
          path: posted_articles.json
          key: posted-log-${{ github.run_id }}
          restore-keys: |
            posted-log-

      - name: Run Auto Blog
        env:
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
        run: |
          python auto_blog_v30.py 2>&1 | tee run_output.txt

      - name: Verify posts
        run: |
          echo "=== Full Output ==="
          cat run_output.txt
          echo "==================="
          if grep -q "Posted!" run_output.txt; then
            echo "✅ Blog posted successfully!"
            grep "Posted!" run_output.txt
          else
            echo "❌ ERROR: No post detected — check logs above"
            exit 1
          fi

      - name: Save post log
        if: always()
        uses: actions/cache@v4
        with:
          path: posted_articles.json
          key: posted-log-${{ github.run_id }}


