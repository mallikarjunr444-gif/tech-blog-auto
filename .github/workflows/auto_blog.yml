name: Auto Blog

on:
  schedule:
    - cron: '0 4 * * *'   # daily 9:30 AM IST (4:00 UTC)
  workflow_dispatch:       # manual trigger button

jobs:
  post-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 15    # kill if stuck

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ──────────────────────────────────
      - name: Install packages
        run: pip install groq requests

      # ── 4. Restore posted_articles.json from cache ──────────────
      #    This keeps memory of all past topics across runs
      - name: Restore post log cache
        uses: actions/cache@v4
        with:
          path: posted_articles.json
          key: posted-log-${{ github.run_id }}
          restore-keys: |
            posted-log-

      # ── 5. Run the script ────────────────────────────────────────
      - name: Run Auto Blog
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
        run: |
          python auto_blog_free.py 2>&1 | tee run_output.txt

      # ── 6. Check posting actually happened ───────────────────────
      - name: Verify posts
        run: |
          if grep -q "Posted!" run_output.txt; then
            echo "✅ Blog posted successfully!"
            grep "Posted!" run_output.txt
          else
            echo "❌ ERROR: No post detected!"
            cat run_output.txt
            exit 1
          fi

      # ── 7. Save updated log back to cache ────────────────────────
      - name: Save post log
        if: always()
        uses: actions/cache@v4
        with:
          path: posted_articles.json
          key: posted-log-${{ github.run_id }}
