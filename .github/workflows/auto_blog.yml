name: Auto Blog
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
jobs:
  post-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install groq requests google-auth google-auth-oauthlib google-api-python-client
      - run: python auto_blog_free.py
